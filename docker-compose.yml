services:
  spark-controlplane:
    # Build locally:
    build: .
    # …or use the published image instead of `build`:
    # image: ghcr.io/jeyelcode/spark-controlplane:v1.0.0
    container_name: spark-controlplane
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      # Strongly recommended: set a stable Fernet key so stored secrets survive
      # container re-creation. Generate one with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # SPARK_SECRET_KEY: "replace-with-a-generated-fernet-key"
      SPARK_DATA_DIR: /data
    restart: unless-stopped
